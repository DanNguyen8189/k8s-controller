# create service account for application; needed for it to interact with k8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-controller
  namespace: k8s-controller
---
# create role that grants permissions to read pods cluster-wide
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-controller-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
# Bind role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-controller-role
subjects:
- kind: ServiceAccount
  name: k8s-controller
  namespace: k8s-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-controller
  namespace: k8s-controller
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-controller
  template:
    metadata:
      labels:
        app: k8s-controller
    spec:
      serviceAccountName: k8s-controller
      containers:
      - name: k8s-controller
        image: localhost:5000/k8s-controller
        imagePullPolicy: Always
        ports:
        - containerPort: 8080